version: '3.8'
services:
  database:
    image: mysql:8
    restart: on-failure
    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    ports:
      - '3306:3306'
    volumes:
      - database:/var/lib/mysql
  web:
    build:
      context: web
      dockerfile: Dockerfile
    environment:
      RAILS_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./web:/opt/project:cached
    depends_on:
      - database
    stdin_open: true
    tty: true

volumes:
  database:
    driver: local
